spring.application.name=climalert

# =========================================================
#  Integracion con WeatherAPI (proveedor externo)
# =========================================================
climalert.weather.base-url=http://api.weatherapi.com/v1
# Reemplazar por tu API key de https://www.weatherapi.com  (o exportar WEATHER_API_KEY)
climalert.weather.api-key=${WEATHER_API_KEY:TU_API_KEY_AQUI}
climalert.weather.location=Buenos Aires

# =========================================================
#  Condiciones criticas y destinatarios de la alerta
# =========================================================
climalert.alerta.umbral-temperatura=35
climalert.alerta.umbral-humedad=60
climalert.alerta.destinatarios=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# =========================================================
#  Tareas programadas (en milisegundos)
#  5 min = 300000 | 1 min = 60000
#  Para demostrar el flujo, bajar estos valores (ej: 20000 y 10000)
# =========================================================
climalert.scheduling.fetch-rate-ms=300000
climalert.scheduling.alert-rate-ms=60000

# =========================================================
#  Persistencia del historico (H2 en memoria)
#  Consola web: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:climalert)
# =========================================================
spring.datasource.url=jdbc:h2:mem:climalert
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# =========================================================
#  Envio de correos
#  Con enabled=false la alerta se muestra en el log (util para probar sin SMTP).
#  Para envio real: enabled=true y completar spring.mail.* (ej: Gmail o Mailtrap).
# =========================================================
climalert.mail.enabled=false
climalert.mail.remitente=no-reply@climalert.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.utn.dsi.climalert=INFO
